# 跨平台测试工作流
# 自动在 Linux、macOS、Windows 三个环境测试 hook 脚本和汉化模块
# 触发条件：push 到 master 分支，或手动触发

name: 🧪 跨平台沙盒测试

on:
  push:
    branches: [main, master]
    paths:
      - 'bin/**'
      - 'localize/**'
      - 'monitor/**'
      - 'package.json'
      - 'README.md'
      - 'tool-tips-post.sh'
      - '.github/workflows/test-localize.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ==================== Linux 测试 ====================
  test-linux:
    name: 🐧 Linux 测试
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 检查 Bash 脚本语法
        run: |
          echo "=== Linux 环境测试 ==="
          bash -n tool-tips-post.sh
          echo "✅ tool-tips-post.sh 语法正确"

      - name: 🔍 检查 Node.js 模块语法
        run: |
          node -c localize/keyword.js
          echo "✅ keyword.js 语法正确"
          node -c localize/localize.js
          echo "✅ localize.js 语法正确"
          node -c monitor/constants.js
          node -c monitor/formatters.js
          node -c monitor/stats-cache.js
          node -c monitor/transcript-counter.js
          node -c monitor/statusline.js
          echo "✅ monitor 模块语法正确"

      - name: 🧪 测试 Hook 中文输出
        run: |
          echo "=== 测试工具提示 Hook ==="
          result=$(echo '{"tool_name":"Read","file_path":"test.py"}' | bash tool-tips-post.sh)
          echo "输出: $result"
          if echo "$result" | grep -q "systemMessage"; then
            echo "✅ Hook 输出格式正确"
          else
            echo "❌ Hook 输出格式错误"
            exit 1
          fi

      - name: 🧪 测试关键词字典
        run: |
          echo "=== 测试关键词字典 ==="
          count=$(node -e "
            const kw = require('./localize/keyword.js');
            const keys = Object.keys(kw);
            console.log(keys.length);
          ")
          echo "📊 关键词数量: $count"
          if [ "$count" -gt 100 ]; then
            echo "✅ 关键词数量充足 ($count 个)"
          else
            echo "⚠️ 关键词数量偏少 ($count 个)"
          fi

      - name: 🧪 测试 Claude 监控状态栏输出
        run: |
          result=$(node -e "process.stdout.write(JSON.stringify({session_id:'test-session',transcript_path:'missing.jsonl',model:{display_name:'Claude Sonnet 4',id:'claude-sonnet-4'},context_window:{total_input_tokens:124000,total_output_tokens:16000,used_percentage:41},cost:{total_cost_usd:0.34}}))" | node monitor/statusline.js)
          echo "输出: $result"
          if echo "$result" | grep -q "Claude 监控:"; then
            echo "✅ 状态栏输出格式正确"
          else
            echo "❌ 状态栏输出格式错误"
            exit 1
          fi

      - name: 🧪 测试安装器写入 statusLine
        run: |
          export HOME="$RUNNER_TEMP/cute-claude-home"
          mkdir -p "$HOME"
          node bin/install.js monitor
          if grep -q '"statusLine"' "$HOME/.claude/settings.json" && grep -q 'statusline.js' "$HOME/.claude/settings.json"; then
            echo "✅ 安装器已写入 statusLine 配置"
          else
            echo "❌ 安装器未正确写入 statusLine 配置"
            exit 1
          fi

  # ==================== macOS 测试 ====================
  test-macos:
    name: 🍎 macOS 测试
    runs-on: macos-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 检查 Bash 脚本语法
        run: |
          echo "=== macOS 环境测试 ==="
          bash -n tool-tips-post.sh
          echo "✅ tool-tips-post.sh 语法正确"

      - name: 🔍 检查 Node.js 模块语法
        run: |
          node -c localize/keyword.js
          echo "✅ keyword.js 语法正确"
          node -c localize/localize.js
          echo "✅ localize.js 语法正确"
          node -c monitor/constants.js
          node -c monitor/formatters.js
          node -c monitor/stats-cache.js
          node -c monitor/transcript-counter.js
          node -c monitor/statusline.js
          echo "✅ monitor 模块语法正确"

      - name: 🧪 测试 Hook 中文输出
        run: |
          echo "=== 测试工具提示 Hook ==="
          result=$(echo '{"tool_name":"Write","file_path":"hello.js"}' | bash tool-tips-post.sh)
          echo "输出: $result"
          if echo "$result" | grep -q "systemMessage"; then
            echo "✅ Hook 输出格式正确"
          else
            echo "❌ Hook 输出格式错误"
            exit 1
          fi

      - name: 🧪 测试关键词字典
        run: |
          echo "=== 测试关键词字典 ==="
          count=$(node -e "
            const kw = require('./localize/keyword.js');
            const keys = Object.keys(kw);
            console.log(keys.length);
          ")
          echo "📊 关键词数量: $count"
          if [ "$count" -gt 100 ]; then
            echo "✅ 关键词数量充足 ($count 个)"
          else
            echo "⚠️ 关键词数量偏少 ($count 个)"
          fi

      - name: 🧪 测试 Claude 监控状态栏输出
        run: |
          result=$(node -e "process.stdout.write(JSON.stringify({session_id:'test-session',transcript_path:'missing.jsonl',model:{display_name:'Claude Sonnet 4',id:'claude-sonnet-4'},context_window:{total_input_tokens:124000,total_output_tokens:16000,used_percentage:41},cost:{total_cost_usd:0.34}}))" | node monitor/statusline.js)
          echo "输出: $result"
          if echo "$result" | grep -q "Claude 监控:"; then
            echo "✅ 状态栏输出格式正确"
          else
            echo "❌ 状态栏输出格式错误"
            exit 1
          fi

      - name: 🧪 测试安装器写入 statusLine
        run: |
          export HOME="$RUNNER_TEMP/cute-claude-home"
          mkdir -p "$HOME"
          node bin/install.js monitor
          if grep -q '"statusLine"' "$HOME/.claude/settings.json" && grep -q 'statusline.js' "$HOME/.claude/settings.json"; then
            echo "✅ 安装器已写入 statusLine 配置"
          else
            echo "❌ 安装器未正确写入 statusLine 配置"
            exit 1
          fi

  # ==================== Windows 测试 ====================
  test-windows:
    name: 🪟 Windows 测试
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 检查 Node.js 模块语法
        shell: pwsh
        run: |
          Write-Host "=== Windows 环境测试 ===" -ForegroundColor Cyan
          node -c localize/keyword.js
          Write-Host "✅ keyword.js 语法正确" -ForegroundColor Green
          node -c localize/localize.js
          Write-Host "✅ localize.js 语法正确" -ForegroundColor Green
          node -c monitor/constants.js
          node -c monitor/formatters.js
          node -c monitor/stats-cache.js
          node -c monitor/transcript-counter.js
          node -c monitor/statusline.js
          Write-Host "✅ monitor 模块语法正确" -ForegroundColor Green

      - name: 🧪 测试关键词字典
        shell: pwsh
        run: |
          Write-Host "=== 测试关键词字典 ===" -ForegroundColor Cyan
          $count = node -e "const kw = require('./localize/keyword.js'); console.log(Object.keys(kw).length);"
          Write-Host "📊 关键词数量: $count"
          if ([int]$count -gt 100) {
            Write-Host "✅ 关键词数量充足 ($count 个)" -ForegroundColor Green
          } else {
            Write-Host "⚠️ 关键词数量偏少 ($count 个)" -ForegroundColor Yellow
          }

      - name: 🧪 测试 Claude 监控状态栏输出
        shell: pwsh
        run: |
          $json = '{"session_id":"test-session","transcript_path":"missing.jsonl","model":{"display_name":"Claude Sonnet 4","id":"claude-sonnet-4"},"context_window":{"total_input_tokens":124000,"total_output_tokens":16000,"used_percentage":41},"cost":{"total_cost_usd":0.34}}'
          $result = $json | node monitor/statusline.js
          Write-Host "输出: $result"
          if ($result -like "*Claude 监控:*") {
            Write-Host "✅ 状态栏输出格式正确" -ForegroundColor Green
          } else {
            Write-Host "❌ 状态栏输出格式错误" -ForegroundColor Red
            exit 1
          }

      - name: 🧪 测试安装器写入 statusLine
        shell: pwsh
        run: |
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP 'cute-claude-home'
          New-Item -ItemType Directory -Force $env:USERPROFILE | Out-Null
          node bin/install.js monitor
          $settingsPath = Join-Path $env:USERPROFILE '.claude\settings.json'
          if ((Test-Path $settingsPath) -and ((Get-Content $settingsPath -Raw) -like '*"statusLine"*') -and ((Get-Content $settingsPath -Raw) -like '*statusline.js*')) {
            Write-Host "✅ 安装器已写入 statusLine 配置" -ForegroundColor Green
          } else {
            Write-Host "❌ 安装器未正确写入 statusLine 配置" -ForegroundColor Red
            exit 1
          }

  # ==================== 测试报告 ====================
  test-report:
    name: 📋 测试报告
    needs: [test-linux, test-macos, test-windows]
    runs-on: ubuntu-latest

    steps:
      - name: 📊 生成测试报告
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║          🎉 跨平台沙盒测试全部通过！                  ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  🐧 Linux   ✅ 通过                                  ║"
          echo "║  🍎 macOS   ✅ 通过                                  ║"
          echo "║  🪟 Windows ✅ 通过                                  ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "📅 测试时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔗 查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
