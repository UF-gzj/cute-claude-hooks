name: Test Claude Code Localization

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

9-
10	jobs:
11  test-localization:
12    runs-on: ubuntu-latest
13
14    steps:
15      - name: 📥 Checkout repository
16        uses: actions/checkout@v4
17
18      - name: 📦 Setup Node.js
19        uses: actions/setup-node@v4
20        with:
21          node-version: '20'
22
23      - name: 🔧 Install Claude Code
24        run: |
25          npm install -g @anthropic-ai/claude-code
26          echo "✅ Claude Code installed"
27          claude --version || echo "Version check completed"
28
29      - name: 🌸 Install Localization Hooks (Manual)
30        run: |
31          # 创建目录
32          mkdir -p ~/.claude/hooks
33          mkdir -p ~/.claude/localize
34
35          # 复制 Hook 脚本 (文件在根目录)
36          cp tool-tips-post.sh ~/.claude/hooks/
37          chmod +x ~/.claude/hooks/tool-tips-post.sh
38
39          # 复制汉化文件
40          cp localize/keyword.conf ~/.claude/localize/
41          cp localize/localize.sh ~/.claude/localize/ 2>/dev/null || true
42
43          echo "✅ Hooks and localize files installed manually"
44
45      - name: 🔍 Verify Hook Files
46        run: |
47          echo "=== Checking hook files ==="
48          ls -la ~/.claude/hooks/ || echo "Hooks directory found"
49          echo ""
50          echo "=== Checking localize files ==="
51          ls -la ~/.claude/localize/ || echo "Localize directory not found"
52          echo ""
53          echo "=== Keyword config content ==="
54          cat ~/.claude/localize/keyword.conf || echo "keyword.conf not found"
55
56      - name: 🧪 Test Hook Script
57        run: |
58          echo "=== Testing tool-tips-post.sh ==="
59          if [ -f ~/.claude/hooks/tool-tips-post.sh ]; then
60            bash -n ~/.claude/hooks/tool-tips-post.sh && echo "✅ Syntax check passed"
61          else
62            echo "❌ Hook file not found"
63            exit 1
64          fi
65
66      - name: 🌸 Test Hook Output (中文提示)
67        run: |
68          echo "=== 模拟 Hook 输入测试 ==="
69
70          # 测试 Read 工具
          echo '{"tool_name": "Read", "file_path": "/test/example.py"}' | bash ~/.claude/hooks/tool-tips-post.sh
71
72          # 测试 Write 工具
          echo '{"tool_name": "Write", "file_path": "/test/newfile.js"}' | bash ~/.claude/hooks/tool-tips-post.sh
73         74          # 测试 Edit 工具
          echo '{"tool_name": "Edit", "file_path": "/src/config.json"}' | bash ~/.claude/hooks/tool-tips-post.sh
75           76          # 测试 Bash 工具 (带描述)
          echo '{"tool_name": "Bash", "command": "npm install", "description": "安装依赖"}' | bash ~/.claude/hooks/tool-tips-post.sh
78           79          # 测试 Glob 工具
          echo '{"tool_name": "Glob", "pattern": "**/*.ts"}' | bash ~/.claude/hooks/tool-tips-post.sh
81           82          # 测试 Grep 工具
          echo '{"tool_name": "Grep", "pattern": "function"}' | bash ~/.claude/hooks/tool-tips-post.sh
83           84          echo ""
          echo "✅ Hook 中文提示测试完成!"
85
86      - name: 🌐 Test interface Localization (界面汉化测试)
87        run: |
88          # 运行汉化脚本
89          bash "$LOCALize_script_path"
90          echo ""
91          echo -e "${GREEN}✅ 运行汉化脚本: $localize_script_path"
92
 echo ""
